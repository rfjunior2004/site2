<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfólio do Aluno</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
  }

  header {
    background: #1e40af;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  header h1 {
    margin: 0;
    font-size: 20px;
  }

  nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
    font-weight: bold;
  }

  nav a:hover {
    text-decoration: underline;
  }

  section {
    padding: 40px;
    text-align: center;
  }

  .btn {
    padding: 10px 20px;
    background: #3b82f6;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
  }

  .card {
    background: #1e293b;
    padding: 20px;
    margin: 20px;
    border-radius: 10px;
  }

  footer {
    background: #020617;
    text-align: center;
    padding: 15px;
  }

  /* RESPONSIVO */
  @media (max-width: 600px) {
    header {
      flex-direction: column;
    }

    nav {
      margin-top: 10px;
    }
  }
</style>

</head>

<body>

<header>
  <h1>Meu Portfólio</h1>
  <nav>
    <a href="#sobre">Sobre</a>
    <a href="#projetos">Projetos</a>
    <a href="#contato">Contato</a>
  </nav>
</header>

<section id="sobre">
  <h2>Sobre mim</h2>
  <p>Olá! Meu nome é [SEU NOME]. Estou aprendendo programação.</p>
</section>

<section id="projetos">
  <h2>Meus Projetos</h2>

<div class="card">
  <h3>Projeto 1</h3>
  <p>Meu primeiro site no GitHub</p>
  <img src="https://www.google.com/imgres?q=computador&imgurl=https%3A%2F%2Fcdn.awsli.com.br%2F2500x2500%2F954%2F954868%2Fproduto%2F35666183%2Fa490b9398a.jpg&imgrefurl=https%3A%2F%2Fwww.brazilpc.com.br%2Fcomputador-brazil-pc-corporativo&docid=eAtfdcsP6pcH5M&tbnid=Fxd5MMLMbKvBQM&vet=12ahUKEwjuqPO9hKyTAxW3KLkGHagUIfEQnPAOegQIFxAB..i&w=2500&h=1496&hcb=2&ved=2ahUKEwjuqPO9hKyTAxW3KLkGHagUIfEQnPAOegQIFxAB/200" alt="Projeto 1">
</div>

<div class="card">
  <h3>Projeto 2</h3>
  <p>Em desenvolvimento...</p>
  <img src="https://via.placeholder.com/200" alt="Projeto 2">
</div>

</section>

<section id="contato">
  <h2>Contato</h2>
  <button class="btn" onclick="mensagem()">Falar comigo</button>
</section>

<footer>
  © 2026 - Meu Portfólio
</footer>

<script>
function mensagem() {
  alert("Obrigado por visitar meu site!");
}
</script>

</body>
</html>
